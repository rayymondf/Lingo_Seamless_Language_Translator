<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Lingo</title>
        <link rel="stylesheet" href="styles.css">
    </head>

    <body data-theme="light">
        <main class="panel">
            <header class="panel__header">
                <div>
                    <h1 class="panel__title">Translate Cleanly</h1>
                    <p class="panel__intro">Easy-to-read translator for quick everyday use</p>
                </div>
            </header>

            <section class="card translator">
                <label class="field" for="textInput">
                    <span class="field__row">
                        <span class="field__label">Text to translate</span>
                        <span id="characterCount" class="field__hint">0 characters</span>
                    </span>
                    <textarea id="textInput" rows="5" placeholder="Type or paste your text here"></textarea>
                </label>

                <label class="field" for="targetLanguage">
                    <span class="field__label">Translate to</span>
                    <select id="targetLanguage" aria-label="Choose a target language"></select>
                </label>

                <div class="actions">
                    <button id="translateBtn" class="button button--primary" type="button">Translate</button>
                    <button id="copyBtn" class="button button--secondary" type="button" disabled>Copy</button>
                </div>

                <label class="field" for="translationInput">
                    <span class="field__label">Translation</span>
                    <textarea id="translationInput" rows="5" placeholder="Your translation will appear here" readonly></textarea>
                </label>

                <p id="statusMessage" class="status" role="status" aria-live="polite"></p>
            </section>

            <section class="card history" aria-labelledby="historyTitle">
                <div class="section-heading">
                    <div>
                        <h2 id="historyTitle" class="section-heading__title">Recent translations</h2>
                        <p class="section-heading__intro">Saved on this browser only</p>
                    </div>
                    <button id="clearHistoryBtn" class="button button--ghost" type="button">Clear</button>
                </div>
                <div id="historyList" class="history__list"></div>
                <p id="emptyHistory" class="history__empty">Your recent translations will appear here.</p>
            </section>
        </main>

        <script src="languageSelector.js"></script>
        <script src="backendService.js"></script>
    </body>
</html>
